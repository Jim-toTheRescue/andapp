<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <title>瓦力播放器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background: #252525;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: width 0.2s;
        }
        .sidebar-header {
            padding: 16px;
            background: #2a2a2a;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header h3 { font-size: 14px; color: #888; }
        .sidebar-toggle {
            background: #444; border: none; color: #fff;
            padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .sidebar-toggle:hover { background: #555; }
        .sidebar-show-btn {
            position: fixed; left: 0; top: 50%; transform: translateY(-50%);
            background: #333; border: none; color: #fff;
            padding: 12px 8px; border-radius: 0 4px 4px 0; cursor: pointer;
            font-size: 12px; z-index: 100; display: none;
        }
        .sidebar-show-btn:hover { background: #444; }
        .sidebar.collapsed { width: 0; padding: 0; overflow: hidden; }
        .main-content {
            flex: 1; display: flex; flex-direction: column; height: 100vh;
        }
        .header {
            padding: 12px 16px; background: #2a2a2a;
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid #333;
        }
        .file-name {
            flex: 1; font-size: 16px; color: #fff;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .player-wrapper {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: #000; position: relative; overflow: hidden;
        }
        .wheel-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 10; background: transparent;
            pointer-events: none;
        }
        video {
            max-width: 100%; max-height: 100%;
            width: auto; height: auto; object-fit: contain;
        }
        .image-viewer {
            display: none; user-select: none;
            width: 100%; height: 100%;
            align-items: center; justify-content: center;
            background: #f0f0f0;
            background-image:
                linear-gradient(45deg, #e0e0e0 25%, transparent 25%),
                linear-gradient(-45deg, #e0e0e0 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #e0e0e0 75%),
                linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .image-viewer img {
            max-width: 100%; max-height: 100%; object-fit: contain;
        }
        .video-list {
            flex: 1; overflow-y: auto; padding: 8px;
        }
        .media-item {
            padding: 12px; border-radius: 6px; cursor: pointer;
            margin-bottom: 4px; transition: background 0.2s;
            font-size: 13px; color: #ccc;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .media-item:hover { background: #333; }
        .media-item.active { background: #1565c0; color: #fff; }
        .media-item .item-type {
            display: inline-block; padding: 2px 6px; border-radius: 3px;
            font-size: 10px; margin-right: 6px; vertical-align: middle;
        }
        .media-item .item-type.video { background: #1565c0; }
        .media-item .item-type.image { background: #7b1fa2; }
        .media-item .item-type.audio { background: #e65100; }
        .loading {
            color: #888; font-size: 18px;
            position: absolute; z-index: 5;
        }
        .error { color: #f44336; font-size: 16px; text-align: center; padding: 20px; }
        .controls-bar {
            background: #2a2a2a; padding: 12px 16px;
            border-top: 1px solid #333;
        }
        .progress-container {
            width: 100%; height: 8px; background: #444;
            border-radius: 4px; cursor: pointer;
            margin-bottom: 12px; position: relative;
        }
        .progress-bar {
            height: 100%; background: #4fc3f7;
            border-radius: 4px; width: 0%;
        }
        .progress-handle {
            position: absolute; top: 50%; right: -6px;
            width: 12px; height: 12px; background: #fff;
            border-radius: 50%; transform: translateY(-50%);
            opacity: 0; transition: opacity 0.2s;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        .progress-container:hover .progress-handle,
        .progress-container.dragging .progress-handle { opacity: 1; }
        .progress-container:hover .progress-bar { background: #81d4fa; }
        .controls-row {
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
        }
        .control-btn {
            background: #444; border: none; color: #fff;
            padding: 10px 16px; border-radius: 6px;
            font-size: 14px; cursor: pointer; transition: all 0.2s;
        }
        .control-btn:hover { background: #555; }
        .control-btn:active { transform: scale(0.95); }
        .control-btn.rewind, .control-btn.forward { background: #1565c0; }
        .control-btn.rewind:hover, .control-btn.forward:hover { background: #1976d2; }
        .control-btn.play { background: #2e7d32; min-width: 80px; }
        .control-btn.play:hover { background: #388e3c; }
        .time-display {
            color: #4fc3f7; font-size: 14px;
            font-family: monospace; min-width: 120px;
        }
        .step-info { color: #888; font-size: 13px; margin-left: auto; }
        .nav-btn {
            background: #333; border: none; color: #fff;
            padding: 10px 14px; border-radius: 6px;
            font-size: 14px; cursor: pointer; transition: all 0.2s;
        }
        .nav-btn:hover { background: #444; }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%; height: auto; max-height: 200px;
                border-right: none; border-bottom: 1px solid #333;
            }
            .main-content { height: auto; flex: 1; }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>媒体列表</h3>
            <button class="sidebar-toggle" id="sidebarToggle" title="收起侧边栏">◀</button>
        </div>
        <div class="video-list" id="mediaList">
            <div style="padding: 20px; color: #666; text-align: center;">加载中...</div>
        </div>
    </div>
    <button class="sidebar-show-btn" id="sidebarShowBtn" title="展开侧边栏">▶</button>

    <div class="main-content">
        <div class="header">
            <div class="file-name" id="fileName">加载中...</div>
        </div>

        <div class="player-wrapper" id="playerWrapper">
            <div class="loading" id="loading">正在加载...</div>
            <video id="videoPlayer" tabindex="0"></video>
            <div class="image-viewer" id="imageViewer">
                <img id="imageEl" src="" alt="">
            </div>
            <div class="wheel-overlay" id="wheelOverlay"></div>
        </div>

        <div class="controls-bar" id="videoControls">
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-handle"></div>
                </div>
            </div>
            <div class="controls-row">
                <button class="nav-btn" id="prevBtn" title="上一个">&larr; 上一个</button>
                <button class="control-btn rewind" onclick="rewind(5)" title="快退5秒">-5s</button>
                <button class="control-btn play" id="playBtn">播放</button>
                <button class="control-btn forward" onclick="forward(5)" title="快进5秒">+5s</button>
                <button class="nav-btn" id="nextBtn" title="下一个">下一个 &rarr;</button>
                <div class="time-display" id="timeDisplay">00:00 / 00:00</div>
                <div class="step-info" id="stepInfo">← → 快进退5秒 | ↑↓ 切换 | F 全屏</div>
            </div>
        </div>

        <div class="controls-bar" id="imageControls" style="display: none;">
            <div class="controls-row">
                <button class="nav-btn" id="imgPrevBtn" title="上一张">&larr; 上一张</button>
                <div class="time-display" id="imageCounter">1 / 1</div>
                <button class="nav-btn" id="imgNextBtn" title="下一张">下一张 &rarr;</button>
                <button class="control-btn" id="fullscreenBtn" title="全屏 F">全屏</button>
                <div class="step-info" id="imageStepInfo">↑↓ 切换 | F 全屏</div>
            </div>
        </div>
    </div>

    <script>
        var video = document.getElementById('videoPlayer');
        var imageViewer = document.getElementById('imageViewer');
        var imageEl = document.getElementById('imageEl');
        var loading = document.getElementById('loading');
        var playBtn = document.getElementById('playBtn');
        var timeDisplay = document.getElementById('timeDisplay');
        var stepInfo = document.getElementById('stepInfo');
        var fileNameEl = document.getElementById('fileName');
        var mediaListEl = document.getElementById('mediaList');
        var progressBar = document.getElementById('progressBar');
        var progressContainer = document.getElementById('progressContainer');
        var prevBtn = document.getElementById('prevBtn');
        var nextBtn = document.getElementById('nextBtn');
        var imgPrevBtn = document.getElementById('imgPrevBtn');
        var imgNextBtn = document.getElementById('imgNextBtn');
        var imageCounter = document.getElementById('imageCounter');
        var videoControls = document.getElementById('videoControls');
        var imageControls = document.getElementById('imageControls');
        var fullscreenBtn = document.getElementById('fullscreenBtn');
        var sidebar = document.getElementById('sidebar');
        var sidebarToggle = document.getElementById('sidebarToggle');
        var sidebarShowBtn = document.getElementById('sidebarShowBtn');
        var wheelOverlay = document.getElementById('wheelOverlay');

        var mediaList = [];
        var currentIndex = -1;
        var isImageMode = false;
        var wheelCooldown = false;

        var urlParams = new URLSearchParams(window.location.search);
        var filePath = urlParams.get('src');
        var sortOrder = urlParams.get('sort') || 'date';

        function isVideoFile(name) {
            var ext = name.split('.').pop().toLowerCase();
            return ['mp4','mkv','avi','webm','mov','wmv','flv','m4v','3gp','ogv'].indexOf(ext) !== -1;
        }
        function isImageFile(name) {
            var ext = name.split('.').pop().toLowerCase();
            return ['jpg','jpeg','png','gif','webp','bmp','svg'].indexOf(ext) !== -1;
        }
        function isAudioFile(name) {
            var ext = name.split('.').pop().toLowerCase();
            return ['mp3','wav','flac','m4a','ogg','aac','wma'].indexOf(ext) !== -1;
        }

        sidebarToggle.addEventListener('click', function() {
            sidebar.classList.add('collapsed');
            sidebarShowBtn.style.display = 'block';
        });
        sidebarShowBtn.addEventListener('click', function() {
            sidebar.classList.remove('collapsed');
            sidebarShowBtn.style.display = 'none';
        });

        function renderMediaList() {
            if (mediaList.length === 0) {
                mediaListEl.innerHTML = '<div style="padding:20px;color:#666;text-align:center">没有媒体文件</div>';
                return;
            }
            var html = '';
            for (var i = 0; i < mediaList.length; i++) {
                var m = mediaList[i];
                var active = i === currentIndex ? ' active' : '';
                var type, label;
                if (isVideoFile(m.name)) { type = 'video'; label = '视频'; }
                else if (isImageFile(m.name)) { type = 'image'; label = '图片'; }
                else { type = 'audio'; label = '音频'; }
                html += '<div class="media-item' + active + '" data-index="' + i + '">' +
                    '<span class="item-type ' + type + '">' + label + '</span>' + m.name + '</div>';
            }
            mediaListEl.innerHTML = html;
            var items = mediaListEl.querySelectorAll('.media-item');
            for (var j = 0; j < items.length; j++) {
                (function(idx) {
                    items[idx].addEventListener('click', function() { showMedia(idx); });
                })(j);
            }
        }

        function showMedia(index) {
            if (index < 0 || index >= mediaList.length) return;
            currentIndex = index;
            var item = mediaList[index];
            var src = item.path || (filePath.substring(0, filePath.lastIndexOf('/') + 1) + item.name);

            if (isImageFile(item.name)) {
                showImage(src, item.name);
            } else {
                showVideo(src, item.name, isAudioFile(item.name));
            }

            window.history.replaceState({}, '', '/player?src=' + encodeURIComponent(src));
            renderMediaList();
            updateNavButtons();
        }

        function showImage(src, name) {
            isImageMode = true;
            video.style.display = 'none';
            imageViewer.style.display = 'flex';
            videoControls.style.display = 'none';
            imageControls.style.display = 'block';
            loading.style.display = 'none';
            video.pause();
            video.src = '';
            imageEl.src = src;
            fileNameEl.textContent = name;
            updateImageCounter();
        }

        function showVideo(src, name, isAudio) {
            isImageMode = false;
            video.style.display = isAudio ? 'none' : 'block';
            imageViewer.style.display = 'none';
            videoControls.style.display = 'block';
            imageControls.style.display = 'none';
            loading.style.display = isAudio ? 'none' : 'flex';

            video.pause();
            video.src = src;
            fileNameEl.textContent = name;
            playBtn.textContent = '播放';
            timeDisplay.textContent = '00:00 / 00:00';
            progressBar.style.width = '0%';

            video.onloadedmetadata = function() {
                loading.style.display = 'none';
                updateTimeDisplay();
                updateProgress();
                video.play();
            };
            video.onplay = function() { playBtn.textContent = '暂停'; };
            video.onpause = function() { playBtn.textContent = '播放'; };
            video.ontimeupdate = function() { updateTimeDisplay(); updateProgress(); };
            video.onerror = function() {
                loading.innerHTML = '<div class="error">加载失败</div>';
            };
        }

        function showPrev() {
            if (currentIndex > 0) showMedia(currentIndex - 1);
        }
        function showNext() {
            if (currentIndex < mediaList.length - 1) showMedia(currentIndex + 1);
        }

        function updateNavButtons() {
            prevBtn.disabled = currentIndex <= 0;
            nextBtn.disabled = currentIndex >= mediaList.length - 1;
            imgPrevBtn.disabled = currentIndex <= 0;
            imgNextBtn.disabled = currentIndex >= mediaList.length - 1;
            updateImageCounter();
        }
        function updateImageCounter() {
            imageCounter.textContent = (currentIndex + 1) + ' / ' + mediaList.length;
        }

        function formatTime(s) {
            if (isNaN(s)) return '00:00';
            var h = Math.floor(s / 3600);
            var m = Math.floor((s % 3600) / 60);
            var sec = Math.floor(s % 60);
            if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
            return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
        }
        function updateTimeDisplay() {
            timeDisplay.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
        }
        function updateProgress() {
            if (video.duration) {
                progressBar.style.width = (video.currentTime / video.duration * 100) + '%';
            }
        }

        function togglePlay() {
            if (video.paused) video.play(); else video.pause();
        }
        function rewind(step) {
            video.currentTime = Math.max(0, video.currentTime - step);
        }
        function forward(step) {
            video.currentTime = Math.min(video.duration || 0, video.currentTime + step);
        }

        function toggleFullscreen() {
            var el = isImageMode ? imageViewer : video;
            if (document.fullscreenElement) document.exitFullscreen();
            else el.requestFullscreen();
        }

        prevBtn.addEventListener('click', showPrev);
        nextBtn.addEventListener('click', showNext);
        imgPrevBtn.addEventListener('click', showPrev);
        imgNextBtn.addEventListener('click', showNext);
        playBtn.addEventListener('click', togglePlay);
        fullscreenBtn.addEventListener('click', toggleFullscreen);

        video.addEventListener('dblclick', function(e) { e.preventDefault(); toggleFullscreen(); });
        imageViewer.addEventListener('dblclick', function(e) { e.preventDefault(); toggleFullscreen(); });
        wheelOverlay.addEventListener('dblclick', function(e) { e.preventDefault(); toggleFullscreen(); });
        video.addEventListener('click', function() { togglePlay(); });

        var dragPlaying = false;
        var isDragging = false;
        progressContainer.addEventListener('mousedown', function(e) {
            e.preventDefault(); e.stopPropagation();
            isDragging = true; dragPlaying = !video.paused;
            video.pause();
            progressContainer.classList.add('dragging');
            doSeek(e.clientX);
        });
        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return; e.preventDefault(); doSeek(e.clientX);
        });
        document.addEventListener('mouseup', function(e) {
            if (!isDragging) return;
            isDragging = false;
            progressContainer.classList.remove('dragging');
            if (dragPlaying) video.play();
        });
        progressContainer.addEventListener('touchstart', function(e) {
            e.preventDefault(); e.stopPropagation();
            isDragging = true; dragPlaying = !video.paused;
            video.pause();
            progressContainer.classList.add('dragging');
            doSeek(e.touches[0].clientX);
        }, { passive: false });
        document.addEventListener('touchmove', function(e) {
            if (!isDragging) return; e.preventDefault(); doSeek(e.touches[0].clientX);
        }, { passive: false });
        document.addEventListener('touchend', function(e) {
            if (!isDragging) return;
            isDragging = false;
            progressContainer.classList.remove('dragging');
            if (dragPlaying) video.play();
        });
        function doSeek(cx) {
            var rect = progressContainer.getBoundingClientRect();
            var p = Math.max(0, Math.min(1, (cx - rect.left) / rect.width));
            video.currentTime = p * video.duration;
            updateProgress();
        }

        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            switch(e.key) {
                case 'ArrowUp': e.preventDefault(); showPrev(); break;
                case 'ArrowDown': e.preventDefault(); showNext(); break;
                case 'f': case 'F': e.preventDefault(); toggleFullscreen(); break;
            }
            if (!isImageMode) {
                switch(e.key) {
                    case 'ArrowLeft': e.preventDefault(); rewind(5); break;
                    case 'ArrowRight': e.preventDefault(); forward(5); break;
                    case ' ': e.preventDefault(); togglePlay(); break;
                    case 'j': case 'J': e.preventDefault(); rewind(10); break;
                    case 'l': case 'L': e.preventDefault(); forward(10); break;
                }
            }
        });

        var wheelAccum = 0;
        var wheelTimer = null;

        function handleWheel(e) {
            var pw = document.getElementById('playerWrapper');
            if (!pw || !pw.contains(e.target)) return;
            e.preventDefault();
            e.stopPropagation();

            wheelAccum += e.deltaY || -e.wheelDelta;

            clearTimeout(wheelTimer);
            wheelTimer = setTimeout(function() {
                if (Math.abs(wheelAccum) > 20) {
                    if (wheelAccum > 0) showNext();
                    else showPrev();
                }
                wheelAccum = 0;
            }, 200);
        }
        document.addEventListener('wheel', handleWheel, { passive: false, capture: true });
        document.addEventListener('mousewheel', handleWheel, { passive: false, capture: true });

        if (!filePath) {
            loading.innerHTML = '<div class="error">未指定文件</div>';
        } else {
            var currentFileName = decodeURIComponent(filePath.split('/').pop());
            fileNameEl.textContent = currentFileName;
            if (isImageFile(currentFileName)) {
                showImage(filePath, currentFileName);
            } else {
                showVideo(filePath, currentFileName, isAudioFile(currentFileName));
            }
            loadMediaList();
        }

        async function loadMediaList() {
            if (!filePath) return;
            var parts = filePath.split('/');
            parts.pop();
            var dirPath = parts.join('/');
            try {
                var url = dirPath ? '/api/files?path=' + encodeURIComponent(dirPath) : '/api/files';
                url += '&sort=' + sortOrder;
                var resp = await fetch(url);
                var data = await resp.json();
                var files = Array.isArray(data) ? data : (data.files || []);
                mediaList = files.filter(function(f) {
                    return !f.isDirectory && (isVideoFile(f.name) || isImageFile(f.name) || isAudioFile(f.name));
                });
                renderMediaList();
                var curName = decodeURIComponent(filePath.split('/').pop());
                currentIndex = -1;
                for (var i = 0; i < mediaList.length; i++) {
                    if (mediaList[i].name === curName) { currentIndex = i; break; }
                }
                updateNavButtons();
            } catch(err) {
                console.error('loadMediaList err:', err);
            }
        }
    </script>
</body>
</html>
