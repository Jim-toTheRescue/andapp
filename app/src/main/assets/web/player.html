<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <title>瓦力播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
        }
        
        .sidebar {
            width: 280px;
            background: #252525;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 16px;
            background: #2a2a2a;
            border-bottom: 1px solid #333;
        }
        
        .sidebar-header h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
        }
        
        .back-link {
            color: #4fc3f7;
            text-decoration: none;
            font-size: 14px;
        }
        
        .video-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .video-item {
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: background 0.2s;
            font-size: 13px;
            color: #ccc;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .video-item:hover {
            background: #333;
        }
        
        .video-item.active {
            background: #1565c0;
            color: #fff;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .header {
            padding: 12px 16px;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #333;
        }
        
        .file-name {
            flex: 1;
            font-size: 16px;
            color: #fff;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .player-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
        }
        
        video {
            max-width: 100%;
            max-height: 100%;
        }
        
        .loading {
            color: #888;
            font-size: 18px;
            position: absolute;
        }
        
        .error {
            color: #f44336;
            font-size: 16px;
            text-align: center;
            padding: 20px;
        }
        
        .controls-bar {
            background: #2a2a2a;
            padding: 12px 16px;
            border-top: 1px solid #333;
        }
        
        .progress-container {
            width: 100%;
            height: 8px;
            background: #444;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 12px;
            position: relative;
        }
        
        .progress-bar {
            height: 100%;
            background: #4fc3f7;
            border-radius: 4px;
            width: 0%;
            transition: width 0.1s;
        }
        
        .progress-container:hover .progress-bar {
            background: #81d4fa;
        }
        
        .controls-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .control-btn {
            background: #444;
            border: none;
            color: #fff;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .control-btn:hover {
            background: #555;
        }
        
        .control-btn:active {
            transform: scale(0.95);
        }
        
        .control-btn.rewind,
        .control-btn.forward {
            background: #1565c0;
        }
        
        .control-btn.rewind:hover,
        .control-btn.forward:hover {
            background: #1976d2;
        }
        
        .control-btn.play {
            background: #2e7d32;
            min-width: 80px;
        }
        
        .control-btn.play:hover {
            background: #388e3c;
        }
        
        .time-display {
            color: #4fc3f7;
            font-size: 14px;
            font-family: monospace;
            min-width: 120px;
        }
        
        .step-info {
            color: #888;
            font-size: 13px;
            margin-left: auto;
        }
        
        .nav-btn {
            background: #333;
            border: none;
            color: #fff;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .nav-btn:hover {
            background: #444;
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                height: auto;
                max-height: 200px;
                border-right: none;
                border-bottom: 1px solid #333;
            }
            
            .main-content {
                height: auto;
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>播放列表</h3>
            <a href="/" class="back-link">&larr; 返回文件列表</a>
        </div>
        <div class="video-list" id="videoList">
            <div style="padding: 20px; color: #666; text-align: center;">加载中...</div>
        </div>
    </div>
    
    <div class="main-content">
        <div class="header">
            <div class="file-name" id="fileName">加载中...</div>
        </div>
        
        <div class="player-wrapper">
            <div class="loading" id="loading">正在加载视频...</div>
            <video id="videoPlayer" tabindex="0"></video>
        </div>
        
        <div class="controls-bar">
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="controls-row">
                <button class="nav-btn" id="prevBtn" onclick="playPrev()" title="上一个">&larr; 上一个</button>
                <button class="control-btn rewind" onclick="rewind(5)" title="快退5秒">-5s</button>
                <button class="control-btn play" id="playBtn" onclick="togglePlay()">播放</button>
                <button class="control-btn forward" onclick="forward(5)" title="快进5秒">+5s</button>
                <button class="nav-btn" id="nextBtn" onclick="playNext()" title="下一个">下一个 &rarr;</button>
                <div class="time-display" id="timeDisplay">00:00 / 00:00</div>
                <div class="step-info" id="stepInfo">← → 快进退5秒 | J L 快进退10秒 | 空格 播放暂停</div>
            </div>
        </div>
    </div>
    
    <script>
        const video = document.getElementById('videoPlayer');
        const loading = document.getElementById('loading');
        const playBtn = document.getElementById('playBtn');
        const timeDisplay = document.getElementById('timeDisplay');
        const stepInfo = document.getElementById('stepInfo');
        const fileNameEl = document.getElementById('fileName');
        const videoListEl = document.getElementById('videoList');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        
        let videoList = [];
        let currentIndex = -1;
        
        const urlParams = new URLSearchParams(window.location.search);
        const videoPath = urlParams.get('src');
        
        function isVideoFile(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            return ['mp4', 'mkv', 'avi', 'webm', 'mov', 'wmv', 'flv', 'm4v', '3gp', 'ogv'].includes(ext);
        }
        
        async function loadVideoList() {
            if (!videoPath) {
                videoListEl.innerHTML = '<div style="padding: 20px; color: #f44336;">未指定视频文件</div>';
                return;
            }
            
            const parts = videoPath.split('/');
            parts.pop();
            const dirPath = parts.join('/');
            
            try {
                const url = dirPath ? '/api/files?path=' + encodeURIComponent(dirPath) : '/api/files';
                const response = await fetch(url);
                const data = await response.json();
                
                // API返回的是数组格式 [{name, path, isDirectory, size, lastModified}]
                const files = Array.isArray(data) ? data : (data.files || []);
                videoList = files.filter(f => !f.isDirectory && isVideoFile(f.name));
                renderVideoList();
                
                const currentFileName = decodeURIComponent(videoPath.split('/').pop());
                currentIndex = videoList.findIndex(v => v.name === currentFileName);
                updateNavButtons();
            } catch (error) {
                console.error('加载视频列表失败:', error);
                videoListEl.innerHTML = '<div style="padding: 20px; color: #f44336;">加载列表失败</div>';
            }
        }
        
        function renderVideoList() {
            if (videoList.length === 0) {
                videoListEl.innerHTML = '<div style="padding: 20px; color: #666;">当前目录没有其他视频</div>';
                return;
            }
            
            videoListEl.innerHTML = videoList.map((v, i) => {
                const isActive = i === currentIndex;
                return `<div class="video-item ${isActive ? 'active' : ''}" onclick="playVideo(${i})" title="${v.name}">${v.name}</div>`;
            }).join('');
        }
        
        function playVideo(index) {
            if (index < 0 || index >= videoList.length) return;
            
            currentIndex = index;
            const v = videoList[index];
            const parts = videoPath.split('/');
            parts.pop();
            const newSrc = parts.join('/') + '/' + encodeURIComponent(v.name);
            
            video.src = newSrc;
            fileNameEl.textContent = v.name;
            
            window.history.replaceState({}, '', '/player?src=' + encodeURIComponent(parts.join('/') + '/' + v.name));
            
            renderVideoList();
            updateNavButtons();
            video.play();
        }
        
        function playPrev() {
            if (currentIndex > 0) {
                playVideo(currentIndex - 1);
            }
        }
        
        function playNext() {
            if (currentIndex < videoList.length - 1) {
                playVideo(currentIndex + 1);
            }
        }
        
        function updateNavButtons() {
            prevBtn.disabled = currentIndex <= 0;
            nextBtn.disabled = currentIndex >= videoList.length - 1;
        }
        
        if (!videoPath) {
            loading.innerHTML = '<div class="error">未指定视频文件</div>';
        } else {
            const currentFileName = decodeURIComponent(videoPath.split('/').pop());
            fileNameEl.textContent = currentFileName;
            
            video.src = videoPath;
            
            video.addEventListener('loadedmetadata', function() {
                loading.style.display = 'none';
                updateTimeDisplay();
                video.focus();
            });
            
            video.addEventListener('error', function() {
                loading.innerHTML = '<div class="error">视频加载失败，请检查文件是否存在</div>';
            });
            
            video.addEventListener('timeupdate', function() {
                updateTimeDisplay();
                updateProgress();
            });
            
            video.addEventListener('play', () => playBtn.textContent = '暂停');
            video.addEventListener('pause', () => playBtn.textContent = '播放');
            
            loadVideoList();
        }
        
        function formatTime(seconds) {
            if (isNaN(seconds)) return '00:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            
            if (h > 0) {
                return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
        
        function updateTimeDisplay() {
            const current = formatTime(video.currentTime);
            const total = formatTime(video.duration);
            timeDisplay.textContent = `${current} / ${total}`;
        }
        
        function updateProgress() {
            if (video.duration) {
                const percent = (video.currentTime / video.duration) * 100;
                progressBar.style.width = percent + '%';
            }
        }
        
        progressContainer.addEventListener('click', function(e) {
            const rect = this.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            video.currentTime = percent * video.duration;
        });
        
        function rewind(step) {
            video.currentTime = Math.max(0, video.currentTime - step);
            showStepHint(`快退 ${step} 秒`);
        }
        
        function forward(step) {
            video.currentTime = Math.min(video.duration || 0, video.currentTime + step);
            showStepHint(`快进 ${step} 秒`);
        }
        
        function togglePlay() {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        }
        
        function showStepHint(text) {
            const original = '← → 快进退5秒 | J L 快进退10秒 | 空格 播放暂停';
            stepInfo.textContent = text;
            stepInfo.style.color = '#4fc3f7';
            setTimeout(() => {
                stepInfo.textContent = original;
                stepInfo.style.color = '#888';
            }, 800);
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    e.preventDefault();
                    e.stopPropagation();
                    rewind(5);
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    e.stopPropagation();
                    forward(5);
                    break;
                case ' ':
                    e.preventDefault();
                    e.stopPropagation();
                    togglePlay();
                    break;
                case 'j':
                case 'J':
                    e.preventDefault();
                    e.stopPropagation();
                    rewind(10);
                    break;
                case 'l':
                case 'L':
                    e.preventDefault();
                    e.stopPropagation();
                    forward(10);
                    break;
                case 'f':
                case 'F':
                    e.preventDefault();
                    e.stopPropagation();
                    if (document.fullscreenElement) {
                        document.exitFullscreen();
                    } else {
                        video.requestFullscreen();
                    }
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    e.stopPropagation();
                    playPrev();
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    e.stopPropagation();
                    playNext();
                    break;
            }
        });
        
        video.addEventListener('dblclick', function() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                video.requestFullscreen();
            }
        });
        
        video.addEventListener('click', function() {
            togglePlay();
        });
    </script>
</body>
</html>
