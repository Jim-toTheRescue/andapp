name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      # 【核心优化】全流程只生成一次版本信息
      - name: Generate Version Env
        id: version_env
        run: |
          echo "v_code=${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "v_name=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      # 【修正】显式传递变量，确保不出现 null
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            -PvCode=${{ steps.version_env.outputs.v_code }} \
            -PvName=${{ steps.version_env.outputs.v_name }}
        
      - name: Update latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "瓦力 v${{ steps.version_env.outputs.v_name }}"
          body: |
            ## 瓦力 Android 自动化交付
            - **内部版本号**: ${{ steps.version_env.outputs.v_code }}
            - **显示版本号**: ${{ steps.version_env.outputs.v_name }}
            - **提交信息**: ${{ github.event.head_commit.message }}
          files: app/build/outputs/apk/debug/*.apk
          prerelease: true
          # 【黑科技】开启此项后，会自动覆盖旧的 latest Release 和文件，无需手动脚本删除
          allowUpdates: true
          make_latest: true
