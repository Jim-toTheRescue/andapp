name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Generate debug keystore if not exists
        run: |
          if [ ! -f app/debug.keystore ]; then
            keytool -genkey -v -keystore app/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" \
              -storepass android -keypass android
            
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add app/debug.keystore
            git commit -m "chore: add debug keystore"
            git push
          fi
        
      - name: Generate Version Env
        id: version_env
        run: |
          echo "v_code=${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "v_name=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            -PvCode=${{ steps.version_env.outputs.v_code }} \
            -PvName=${{ steps.version_env.outputs.v_name }}
        
      - name: Delete old release
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: 'latest'
              });
              
              for (const asset of release.data.assets) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id
                });
              }
              
              console.log('Deleted old assets');
            } catch (error) {
              console.log('No existing release found');
            }

      - name: Update latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "瓦力 v${{ steps.version_env.outputs.v_name }}"
          body: |
            ## 瓦力 Android 自动化交付
            - **内部版本号**: ${{ steps.version_env.outputs.v_code }}
            - **显示版本号**: ${{ steps.version_env.outputs.v_name }}
            - **提交信息**: ${{ github.event.head_commit.message }}
          files: app/build/outputs/apk/debug/*.apk
          prerelease: true
          make_latest: true
